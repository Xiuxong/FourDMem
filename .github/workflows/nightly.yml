name: Nightly

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 3:00 AM
  workflow_dispatch:  # Allow manual trigger

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install Python deps
        run: cd python && pip install -e "."

      - name: Run pip audit
        run: pip-audit

  update-and-test:
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Update dependencies
        run: cargo update

      - name: Run full test suite
        run: cargo test --workspace --exclude py-bindings --features retrieval-core/vector-index

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Nightly build failed',
              body: 'The nightly dependency update and test run failed. Check the workflow run for details.',
              labels: ['ci', 'nightly']
            })
